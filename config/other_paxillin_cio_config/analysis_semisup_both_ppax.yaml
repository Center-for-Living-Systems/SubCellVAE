# Analysis (cio): semisup_both | dataset: ppax
# MODEL_RUN is substituted at runtime by run_other_paxillin_cio.sh
root_folder : "/home/lding/lding/fa_data_analysis"
input:
  latents_csv  : root_folder + "/ae_results/other_paxillin_cio/MODEL_RUN/semisup_both/ppax/latents_newdata.csv"
  split_filter : "all"

output:
  out_dir : root_folder + "/ae_results/other_paxillin_cio/MODEL_RUN/semisup_both/ppax/analysis"

embedding:
  methods:
    - UMAP
  umap_model_pkl    : root_folder + "/ae_results/MODEL_RUN/semisup_both/fa_cls_lat8/umap_all_model.pkl"
  umap_n_neighbors  : 15
  umap_min_dist     : 0.1
  umap_random_state : 42

clustering:
  kmeans_enabled    : true
  kmeans_n_clusters : 5
  dbscan_enabled    : false
  boxplot_kind      : box

label_orders:
  condition_name:
    - "control"
    - "ycomp"

misc:
  log_level : "INFO"
