# =============================================================================
# Analysis pipeline configuration
# Reads latents.csv produced by run_ae_from_config.py and generates
# embeddings, clustering, and plots.
# =============================================================================

# ---------------------------------------------------------------------------
# Input
# ---------------------------------------------------------------------------
input:
  latents_csv  : "/mnt/d/lding/CLS_GitHub/SubCellAE/results/ae_run/semisup/latents.csv"
  split_filter : "all"    # "all" | "train" | "val"

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
output:
  out_dir : "/mnt/d/lding/CLS_GitHub/SubCellAE/results/ae_run/semisup/analysis"

# ---------------------------------------------------------------------------
# Embedding
# ---------------------------------------------------------------------------
embedding:
  methods:
    - UMAP
    # - PHATE      # uncomment to also run PHATE (requires: pip install phate)

  umap_n_neighbors  : 15
  umap_min_dist     : 0.1
  umap_random_state : 42

  phate_k: 5       # only used when PHATE is in methods

# ---------------------------------------------------------------------------
# Clustering
# ---------------------------------------------------------------------------
clustering:
  kmeans_enabled    : true
  kmeans_n_clusters : 5      # set to match expected number of FA types

  dbscan_enabled    : false
  dbscan_eps        : 0.5
  dbscan_min_samples: 10

  boxplot_kind: box          # "box" or "violin" for latent-dim plots

# ---------------------------------------------------------------------------
# Label orders  –  defines the display order for categories in all plots.
# If a section is omitted (or set to null), values are sorted alphabetically.
# ---------------------------------------------------------------------------
label_orders:
  annotation_label_name:
    - "Nascent Adhesion"
    - "focal complex"
    - "focal adhesion"
    - "fibrillar adhesion"
    - "No adhesion"
  condition_name:
    - "control"
    - "ycomp"

# ---------------------------------------------------------------------------
# Misc
# ---------------------------------------------------------------------------
misc:
  log_level : "INFO"   # DEBUG | INFO | WARNING | ERROR
