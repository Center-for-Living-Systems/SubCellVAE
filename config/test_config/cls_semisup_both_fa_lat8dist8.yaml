# =============================================================================
# Classification: FA type | AE: semisup_both | Features: latent 8-dim + dist 8-dim
# Results: results/test_run/semisup_both/fa_cls_lat8dist8/
# =============================================================================

input:
  latents_csv : "/mnt/d/lding/CLS_GitHub/SubCellAE/results/test_run/semisup_both/latents.csv"

output:
  out_dir : "/mnt/d/lding/CLS_GitHub/SubCellAE/results/test_run/semisup_both/fa_cls_lat8dist8"

labels:
  label_col    : "classification"
  label_csv    : "/mnt/d/lding/FA/analysis_results/labelling/paxdata_paxpatch_batch1and2_combined_labels.csv"
  filename_col : "unique_ID"
  label_order  :
    - "Nascent Adhesion"
    - "focal complex"
    - "focal adhesion"
    - "fibrillar adhesion"
    - "No adhesion"
  exclude_labels: null

features:
  feature_cols          : null
  include_mean_intensity: false

split:
  strategy    : "from_csv"
  test_size   : 0.2
  random_state: 42

lightgbm:
  n_estimators     : 500
  learning_rate    : 0.05
  num_leaves       : 31
  min_child_samples: 20
  class_weight     : "balanced"
  n_cv_folds       : 5

dist_features:
  patch_prep_dirs:
    - "/mnt/d/lding/FA/analysis_results/FA_ML_Annabel_20250217/031125/pax_ch_patch/plot_control_20260321_2300"
    - "/mnt/d/lding/FA/analysis_results/FA_ML_Annabel_20250217/031125/pax_ch_patch/plot_ycomp_20260321_2255"
  feature_weight : 20.0

patch_sort:
  sort_labelled  : true
  sort_unlabelled: false

misc:
  log_level : "INFO"
