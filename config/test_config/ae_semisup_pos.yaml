# =============================================================================
# AE variant: semisup_pos  (semi-supervised AE, Position label supervision only)
# Results: results/test_run/semisup_pos/
# =============================================================================

data:
  patch_dirs:
    - path           : "/mnt/d/lding/FA/analysis_results/FA_ML_Annabel_20250217/031125/pax_ch_patch/patch_control_20260318_2318"
      condition      : 0
      condition_name : "control"
    - path           : "/mnt/d/lding/FA/analysis_results/FA_ML_Annabel_20250217/031125/pax_ch_patch/patch_ycomp_20260318_2325"
      condition      : 1
      condition_name : "ycomp"

output:
  result_dir : "/mnt/d/lding/CLS_GitHub/SubCellAE/results/test_run/semisup_pos"

model:
  model_type   : "semisup"
  latent_dim   : 8
  input_ps     : 32
  no_ch        : 1
  BN_flag      : false
  dropout_flag : false

  num_classes  : 5
  lambda_recon : 1.0
  lambda_cls   : 0.0    # FA-type head OFF

  num_classes_2 : 4
  lambda_cls_2  : 1.0   # Position head ON

training:
  epochs                  : 500
  lr                      : 0.001
  batch_size              : 128
  val_split               : 0.2
  loss_norm_flag          : false
  group_split             : true
  weight_decay            : 0.0001
  early_stopping_patience : 0       # disabled – run all 500 epochs
  min_epochs_for_best     : 200     # only save best checkpoint after epoch 200

annotation:
  annotation_file : "/mnt/d/lding/FA/analysis_results/labelling/paxdata_paxpatch_batch1and2_combined_labels.csv"
  label_col       : "classification"
  filename_col    : "unique_ID"
  label_order     :
    - "Nascent Adhesion"
    - "focal complex"
    - "focal adhesion"
    - "fibrillar adhesion"
    - "No adhesion"

  annotation_file_2 : "/mnt/d/lding/FA/analysis_results/labelling/paxdata_paxpatch_batch1and2_combined_labels.csv"
  label_col_2       : "Position"
  filename_col_2    : "unique_ID"
  label_order_2     :
    - "Cell Protruding Edge"
    - "Cell Periphery/other"
    - "Lamella"
    - "Cell Body"

reconstruction:
  save_recon      : true
  recon_pad_size  : 64
  recon_image_size: 1024

misc:
  device    : "auto"
  log_level : "INFO"
