# =============================================================================
# AE variant: conae  (NT-Xent contrastive AE, self-supervised, no label)
# Augmentation: D4 rotations + H-flip + intensity scaling (cell_insideoutside norm)
# Results: results/test_run_cio_rb/conae/
# =============================================================================
root_folder : "/home/lding/lding/fa_data_analysis"
data:
  patch_dirs:
    - path           : root_folder + "/ae_results/patches/cio_rb/vinc/control/tiff_patches32"
      condition      : 0
      condition_name : "control"
    - path           : root_folder + "/ae_results/patches/cio_rb/vinc/ycomp/tiff_patches32"
      condition      : 1
      condition_name : "ycomp"

output:
  result_dir : root_folder + "/ae_results/test_run_cio_rb/conae"

model:
  model_type   : "contrastive"
  latent_dim   : 8
  input_ps     : 32
  no_ch        : 1
  BN_flag      : false
  dropout_flag : false

  # -- Contrastive-specific --------------------------------------------------
  proj_dim              : 64       # projection-head output dim for NT-Xent loss
  noise_prob            : 0.0      # salt-and-pepper noise (disabled; geometry only)
  temperature           : 0.5      # NT-Xent softmax temperature
  lambda_recon          : 1.0      # weight on reconstruction term
  lambda_contrast       : 0.5      # weight on contrastive term
  intensity_scale_range : [0.8, 1.2]
  use_flip              : true     # H-flip covers all 8 D4 symmetries with 4 rotations

training:
  epochs         : 500
  lr             : 0.001
  batch_size     : 128
  val_split      : 0.2
  loss_norm_flag : false
  group_split    : true
  lr_scheduler   : "cosine"
  lr_min         : 1e-5

reconstruction:
  save_recon      : true
  recon_pad_size  : 64
  recon_image_size: 1024

misc:
  device    : "auto"
  log_level : "INFO"
