# =============================================================================
# Cross-classification visualization configuration
# Loads predictions from FA-type and Position classifiers and produces:
#   - UMAP plots coloured by each classifier's predictions
#   - Crosstab heatmaps (Position × FA-type) for all/control/ycomp/train/val
# =============================================================================

# ---------------------------------------------------------------------------
# Root folder  –  change ONLY this when switching computers.
# All data/result paths below are rooted here.
# ---------------------------------------------------------------------------
root_folder : "/home/lding/lding/fa_data_analysis"

# ---------------------------------------------------------------------------
# Input
# ---------------------------------------------------------------------------
input:
  # latents.csv from the AE pipeline (used to load z_* features for UMAP)
  latents_csv : root_folder + "/ae_results/ae_run/semisup/latents.csv"

  # predictions_all.csv saved by each classification pipeline run
  fa_type_results_csv  : root_folder + "/ae_results/ae_run/semisup/FA_type_2L_lat8_classification/predictions_all.csv"
  position_results_csv : root_folder + "/ae_results/ae_run/semisup/position_2L_classification_lat8/predictions_all.csv"

  # Saved UMAP model from the FA-type classification run.
  # If this file does not exist, a new UMAP is fitted on z_* from latents_csv.
  umap_model_pkl : root_folder + "/ae_results/ae_run/semisup/FA_type_2L_lat8_classification/umap_all_model.pkl"

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
output:
  out_dir : root_folder + "/ae_results/ae_run/semisup/cross_classification_vis"

# ---------------------------------------------------------------------------
# Labels
# ---------------------------------------------------------------------------
labels:
  # Column name used as the FA-type true label in fa_type_results_csv
  fa_type_label_col  : "classification"
  # Column name used as the Position true label in position_results_csv
  position_label_col : "Position"

  # Ordered class names for FA-type (defines crosstab column order)
  fa_type_order:
    - "Nascent Adhesion"
    - "focal complex"
    - "focal adhesion"
    - "fibrillar adhesion"
    - "No adhesion"

  # Ordered class names for Position (defines crosstab row order)
  position_order:
    - "Cell Protruding Edge"
    - "Cell Periphery/other"
    - "Lamella"
    - "Cell Body"    

# ---------------------------------------------------------------------------
# Misc
# ---------------------------------------------------------------------------
misc:
  random_state : 42
  log_level    : "INFO"   # DEBUG | INFO | WARNING | ERROR
