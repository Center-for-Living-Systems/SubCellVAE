root_folder : "/home/lding/lding/fa_data_analysis"
input:
  predictions_csv : root_folder + "/ae_results/variant_pax/MODEL_RUN/semisup_fa/nih3t3/fa_cls_lat8/predictions_all.csv"
output:
  out_dir : root_folder + "/ae_results/variant_pax/MODEL_RUN/semisup_fa/nih3t3/fa_cls_lat8/overlay"
labels:
