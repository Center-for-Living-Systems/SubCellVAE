# =============================================================================
# Cross-classification visualization: AE: semisup_both | Features: lat8+dist8 – new data
# Results: results/newdata_validation/semisup_both/vis_lat8dist8/
# Note: umap_model_pkl is null → vis script fits fresh UMAP on lat8 features
#       (the lat8dist8 UMAP model has 16-dim input, not compatible here).
# =============================================================================

input:
  latents_csv          : "/mnt/d/lding/CLS_GitHub/SubCellAE/results/newdata_validation/semisup_both/latents_newdata.csv"
  fa_type_results_csv  : "/mnt/d/lding/CLS_GitHub/SubCellAE/results/newdata_validation/semisup_both/fa_cls_lat8dist8/predictions_all.csv"
  position_results_csv : "/mnt/d/lding/CLS_GitHub/SubCellAE/results/newdata_validation/semisup_both/pos_cls_lat8dist8/predictions_all.csv"
  umap_model_pkl       : null   # fit fresh UMAP on lat8 features

output:
  out_dir : "/mnt/d/lding/CLS_GitHub/SubCellAE/results/newdata_validation/semisup_both/vis_lat8dist8"

labels:
  fa_type_label_col  : "classification"    # not present in newdata → true-label plots skipped
  position_label_col : "Position"          # not present in newdata → true-label plots skipped
  fa_type_order:
    - "Nascent Adhesion"
    - "focal complex"
    - "focal adhesion"
    - "fibrillar adhesion"
    - "No adhesion"
  position_order:
    - "Cell Protruding Edge"
    - "Cell Periphery/other"
    - "Lamella"
    - "Cell Body"

misc:
  random_state : 42
  log_level    : "INFO"
