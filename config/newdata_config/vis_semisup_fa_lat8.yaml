# =============================================================================
# Cross-classification visualization: AE: semisup_fa | Features: lat8 – new data
# Results: results/newdata_validation/semisup_fa/vis_lat8/
# No true labels – only predicted-label UMAPs and crosstabs are produced.
# =============================================================================

input:
  latents_csv          : "/mnt/d/lding/CLS_GitHub/SubCellAE/results/newdata_validation/semisup_fa/latents_newdata.csv"
  fa_type_results_csv  : "/mnt/d/lding/CLS_GitHub/SubCellAE/results/newdata_validation/semisup_fa/fa_cls_lat8/predictions_all.csv"
  position_results_csv : "/mnt/d/lding/CLS_GitHub/SubCellAE/results/newdata_validation/semisup_fa/pos_cls_lat8/predictions_all.csv"
  umap_model_pkl       : "/mnt/d/lding/CLS_GitHub/SubCellAE/results/newdata_validation/semisup_fa/fa_cls_lat8/umap_newdata_model.pkl"

output:
  out_dir : "/mnt/d/lding/CLS_GitHub/SubCellAE/results/newdata_validation/semisup_fa/vis_lat8"

labels:
  fa_type_label_col  : "classification"    # not present in newdata → true-label plots skipped
  position_label_col : "Position"          # not present in newdata → true-label plots skipped
  fa_type_order:
    - "Nascent Adhesion"
    - "focal complex"
    - "focal adhesion"
    - "fibrillar adhesion"
    - "No adhesion"
  position_order:
    - "Cell Protruding Edge"
    - "Cell Periphery/other"
    - "Lamella"
    - "Cell Body"

misc:
  random_state : 42
  log_level    : "INFO"
