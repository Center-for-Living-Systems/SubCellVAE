# =============================================================================
# Analysis: AE: semisup_fa – new validation data
# Results:  results/newdata_validation/semisup_fa/analysis/
# =============================================================================
root_folder : "/home/lding/lding/fa_data_analysis"
input:
  latents_csv  : root_folder + "/ae_results/newdata_validation/semisup_fa/latents_newdata.csv"
  split_filter : "all"

output:
  out_dir : root_folder + "/ae_results/newdata_validation/semisup_fa/analysis"

embedding:
  methods:
    - UMAP
  umap_model_pkl : root_folder + "/ae_results/test_run_overfit_20260322/semisup_fa/fa_cls_lat8/umap_all_model.pkl"

clustering:
  kmeans_enabled    : true
  kmeans_n_clusters : 5
  dbscan_enabled    : false
  dbscan_eps        : 0.5
  dbscan_min_samples: 10
  boxplot_kind      : box

label_orders:
  condition_name:
    - "control"
    - "ycomp"

misc:
  log_level : "INFO"
