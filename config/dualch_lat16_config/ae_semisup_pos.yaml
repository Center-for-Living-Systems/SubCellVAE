# =============================================================================
# Dual-channel AE (ch1+ch3): semisup_pos  (Position label supervision only)
# Results: ae_results/dualch_run_lat16/semisup_pos/
# =============================================================================
root_folder : "/home/lding/lding/fa_data_analysis"
data:
  patch_dirs:
    - channel_dirs:
        - root_folder + "/ae_results/pax_ch_patch/patch_control_ch1"
        - root_folder + "/ae_results/pax_ch_patch/patch_control_ch3"
      condition      : 0
      condition_name : "control"
    - channel_dirs:
        - root_folder + "/ae_results/pax_ch_patch/patch_ycomp_ch1"
        - root_folder + "/ae_results/pax_ch_patch/patch_ycomp_ch3"
      condition      : 1
      condition_name : "ycomp"

output:
  result_dir : root_folder + "/ae_results/dualch_run_lat16/semisup_pos"

model:
  model_type   : "semisup"
  latent_dim   : 16
  input_ps     : 32
  no_ch        : 2
  BN_flag      : false
  dropout_flag : false

  num_classes  : 5
  lambda_recon : 1.0
  lambda_cls   : 0.0    # FA-type head OFF

  num_classes_2 : 4
  lambda_cls_2  : 1.0   # Position head ON

training:
  epochs                  : 500
  lr                      : 0.001
  batch_size              : 128
  val_split               : 0.2
  loss_norm_flag          : false
  group_split             : true
  weight_decay            : 0.0001
  early_stopping_patience : 0
  min_epochs_for_best     : 200
  warmup_epochs           : 200

annotation:
  annotation_file : root_folder + "/labelling/paxdata_paxpatch_batch1and2_combined_labels.csv"
  label_col       : "classification"
  filename_col    : "unique_ID"
  label_order     :
    - "Nascent Adhesion"
    - "focal complex"
    - "focal adhesion"
    - "fibrillar adhesion"
    - "No adhesion"

  annotation_file_2 : root_folder + "/labelling/paxdata_paxpatch_batch1and2_combined_labels.csv"
  label_col_2       : "Position"
  filename_col_2    : "unique_ID"
  label_order_2     :
    - "Cell Protruding Edge"
    - "Cell Periphery/other"
    - "Lamella"
    - "Cell Body"

reconstruction:
  save_recon      : true
  recon_pad_size  : 64
  recon_image_size: 1024

misc:
  device    : "auto"
  log_level : "INFO"
