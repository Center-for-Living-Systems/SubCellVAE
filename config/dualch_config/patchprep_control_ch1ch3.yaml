# =============================================================================
# Patch-prep: training data – control – channels 1 and 3 only
# Produces:
#   ae_results/pax_ch_patch/patch_control_ch1/
#   ae_results/pax_ch_patch/patch_control_ch3/
# =============================================================================

paths:
  root_folder       : "/home/lding/lding/fa_data_analysis"
  image_folder      : root_folder + "/fa_data/031125data/Control"
  cell_mask_folder  : root_folder + "/fa_cellseg/031125analysis/control/code_org_20250820_seg/mask"
  patch_output_dir  : root_folder + "/ae_results/pax_ch_patch/patch_control"
  plot_output_dir   : root_folder + "/ae_results/pax_ch_patch/plot_control"

experiment:
  condition : "czi_dataset_norm"
  channels  : [1, 3]   # dual-channel mode — extracts ch1 and ch3 into separate subdirs

input:
  file_type : "czi"
  start_ind : 0
  end_ind   : 999

patch:
  patch_size   : 32
  mask_ratio   : 0.4
  pad_size     : 64
  patch_prefix : "control"

preprocessing:
  rolling_ball_radius : null

normalization:
  norm_mode           : "dataset"   # null | "image" | "dataset" | "cell_insideoutside"
  norm_channels       : null        # overridden per channel in multichannel mode
  norm_lo             : 0.2
  norm_hi             : 99.8
  norm_cell_scale     : 5.0

segmentation:
  seg_ch               : 3
  seg_threshold        : 0.2
  seg_close_size       : 5
  seg_min_size_initial : 3
  seg_min_size_post_close : 10
  seg_min_size_final   : 30000

augmentation:
  rand_trans    : false
  max_shift_px  : 0
  rand_rota     : false
  max_angle_deg : 0.0

misc:
  dpi       : 256
  debug     : false
  log_level : "INFO"
